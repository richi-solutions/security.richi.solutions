# Orchestrator: Runs documentation updater agent across all org repos
#
# This workflow discovers all repos in the richi-solutions org that have
# a .claude/agents/documentation.md file, then runs the Claude agent
# to generate/update documentation and opens a PR with the changes.
#
# Requires org secrets:
#   - ANTHROPIC_API_KEY
#   - ORG_PAT (GitHub PAT with repo scope for creating PRs across repos)

name: Orchestrate Documentation Update

on:
  schedule:
    - cron: "0 8 * * 3" # Weekly Wednesday 08:00 UTC (3h after sync-dotclaude)
  workflow_dispatch:

jobs:
  discover:
    name: Discover Repos
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - name: List org repos with documentation agent
        id: list
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          # Get all non-archived repos in the org
          REPOS=$(gh repo list richi-solutions \
            --no-archived \
            --json name,name \
            --limit 100 \
            -q '.[].name' \
            | grep -v '^orchestrator\.richi\.solutions$' \
            | grep -v '^\\.claude$')

          # Filter to repos that have the documentation agent
          VALID_REPOS="[]"
          for repo in $REPOS; do
            if gh api "repos/richi-solutions/$repo/contents/.claude/agents/documentation.md" --silent 2>/dev/null; then
              VALID_REPOS=$(echo "$VALID_REPOS" | jq --arg r "$repo" '. + [$r]')
            fi
          done

          echo "repos=$(echo $VALID_REPOS | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "Found repos with documentation agent: $VALID_REPOS"

  update-docs:
    name: Update Docs — ${{ matrix.repo }}
    needs: discover
    if: needs.discover.outputs.repos != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.discover.outputs.repos) }}
      fail-fast: false
      max-parallel: 3
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: richi-solutions/${{ matrix.repo }}
          token: ${{ secrets.ORG_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Documentation Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You are the documentation agent. Read .claude/agents/documentation.md for your full instructions, then analyze this project and generate/update all documentation: README.md, code comments (JSDoc/@fileoverview), architecture docs, CONTRIBUTING.md, and .env.example. CRITICAL RULES: Do NOT modify application logic. Do NOT modify any files under .claude/ — that directory is managed by sync-dotclaude and must not be touched." \
            --allowedTools "Bash,Read,Edit,Write,Grep,Glob" \
            --model claude-sonnet-4-6 \
            --max-turns 30 \
            --output-format json \
            > /tmp/docs-result.json 2>&1 || true

      - name: Create Docs PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="docs-update-$(date +%Y%m%d)"

            # Check if branch already exists (avoid duplicate PRs)
            if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
              echo "Branch $BRANCH already exists for ${{ matrix.repo }}, skipping"
              exit 0
            fi

            # Revert any changes to .claude/ (managed by sync-dotclaude)
            git checkout -- .claude/ 2>/dev/null || true

            git config user.name "claude-docs-bot"
            git config user.email "docs@richi-solutions.com"
            git checkout -b "$BRANCH"
            git add -A -- ':!.claude/'
            git commit -m "$(cat <<'EOF'
          docs: automated documentation update

          Generated/updated by Claude documentation agent:
          - README.md improvements
          - JSDoc comments on exported functions
          - @fileoverview headers on modules
          - Architecture docs and contributing guide

          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
          EOF
            )"
            git push origin "$BRANCH"

            # Extract summary from Claude output
            SUMMARY=$(cat /tmp/docs-result.json | jq -r '.result // "No summary available"' 2>/dev/null || echo "Documentation update completed, see diff for changes.")

            # Ensure labels exist (create if missing)
            gh label create "documentation" --repo "richi-solutions/${{ matrix.repo }}" --color "0075ca" --description "Documentation updates" 2>/dev/null || true
            gh label create "automated" --repo "richi-solutions/${{ matrix.repo }}" --color "bfdadc" --description "Automated by CI" 2>/dev/null || true

            gh pr create \
              --repo "richi-solutions/${{ matrix.repo }}" \
              --title "docs: automated documentation update $(date +%Y-%m-%d)" \
              --body "$(cat <<EOF
          ## Documentation Update — Automated

          This PR was generated by the Claude documentation agent.

          ### What Changed

          $SUMMARY

          ### Review Checklist

          - [ ] README.md changes are accurate
          - [ ] Code comments are correct and helpful
          - [ ] No application logic was modified
          - [ ] File paths and script names are verified

          ---
          _Generated by Claude documentation agent via [orchestrate-docs.yml](https://github.com/richi-solutions/orchestrator.richi.solutions)_
          EOF
            )" \
              --label "documentation,automated" \
              2>&1 | tee /tmp/pr-url.txt

            # Auto-merge the PR (squash) to minimize branch lifetime
            PR_URL=$(grep -o 'https://[^ ]*' /tmp/pr-url.txt || true)
            if [ -n "$PR_URL" ]; then
              gh pr merge "$PR_URL" --squash --delete-branch --admin || echo "Auto-merge failed for ${{ matrix.repo }}, PR remains open for manual review"
            fi
          else
            echo "No documentation changes needed for ${{ matrix.repo }}"
          fi
