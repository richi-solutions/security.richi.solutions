# Distribute shared .claude/ content to all agent repos
#
# The orchestrator is the single source of truth for .claude/.
# This workflow copies shared directories (agents, rules, ref, skills,
# sync, settings.json) to each *.richi.solutions repo.
#
# Project-specific files (CLAUDE.md, .mcp.json, reviews/) are NOT touched.
# Config files from .claude/sync/ are also copied to the repo root.
#
# Requires:
#   - ORG_PAT secret (GitHub PAT with repo + workflow scope)

name: Sync .claude

on:
  push:
    branches: [main]
    paths:
      - '.claude/**'
  schedule:
    - cron: "0 5 * * *" # Daily 05:00 UTC — catches new repos
  workflow_dispatch:

jobs:
  sync:
    name: Distribute .claude
    runs-on: ubuntu-latest

    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v4
        with:
          path: orchestrator

      - name: Discover target repos
        id: discover
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
          ORG_NAME: ${{ github.repository_owner }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::ORG_PAT secret is not set."
            exit 1
          fi

          REPOS=$(gh api "user/repos?per_page=100&affiliation=owner" \
            --paginate \
            --jq '[.[] | select(.archived == false)
                       | select(.name | endswith(".richi.solutions"))
                       | select(.name != "orchestrator.richi.solutions")
                       | {name: .name, default_branch: .default_branch}]')

          {
            echo "repos<<REPOS_EOF"
            echo "$REPOS"
            echo "REPOS_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Discovered repos:"
          echo "$REPOS" | jq -r '.[] | "  - \(.name) (branch: \(.default_branch))"'

      - name: Sync .claude to repos
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
          ORG_NAME: ${{ github.repository_owner }}
          REPOS: ${{ steps.discover.outputs.repos }}
        run: |
          SOURCE="$GITHUB_WORKSPACE/orchestrator/.claude"
          REPO_COUNT=$(echo "$REPOS" | jq length)

          SUCCESS=0
          FAILED=0
          SKIPPED=0
          DETAILS=""

          for i in $(seq 0 $((REPO_COUNT - 1))); do
            REPO_NAME=$(echo "$REPOS" | jq -r ".[$i].name")
            DEFAULT_BRANCH=$(echo "$REPOS" | jq -r ".[$i].default_branch")

            echo "::group::Syncing .claude to $REPO_NAME (branch: $DEFAULT_BRANCH)"

            WORK_DIR="/tmp/${REPO_NAME}"

            if ! git clone --depth 1 --branch "$DEFAULT_BRANCH" \
              "https://x-access-token:${GH_TOKEN}@github.com/${ORG_NAME}/${REPO_NAME}.git" \
              "$WORK_DIR" 2>/dev/null; then
              echo "::warning::Failed to clone $REPO_NAME"
              FAILED=$((FAILED + 1))
              DETAILS="${DETAILS}| ${REPO_NAME} | Clone failed |\n"
              echo "::endgroup::"
              continue
            fi

            cd "$WORK_DIR" || {
              echo "::warning::Failed to cd into $WORK_DIR"
              FAILED=$((FAILED + 1))
              echo "::endgroup::"
              continue
            }

            # Ensure .claude/ directory exists
            mkdir -p .claude

            # Copy shared directories from orchestrator
            # (rsync deletes removed files, respects exclusions)
            rsync -a --delete \
              --exclude='CLAUDE.local.md' \
              --exclude='settings.local.json' \
              --exclude='.mcp.json' \
              --exclude='reviews/' \
              "$SOURCE/" .claude/

            # Copy config files from sync/ to repo root
            if [ -d ".claude/sync" ]; then
              cp -r .claude/sync/. .
            fi

            if [ -z "$(git status --porcelain)" ]; then
              echo "No changes needed for $REPO_NAME"
              SKIPPED=$((SKIPPED + 1))
              DETAILS="${DETAILS}| ${REPO_NAME} | Up to date |\n"
              echo "::endgroup::"
              cd /
              rm -rf "$WORK_DIR"
              continue
            fi

            git diff --stat

            git config user.name "richi-config-bot"
            git config user.email "config@richi-solutions.com"
            git add -A
            git commit -m "chore: sync .claude from orchestrator" \
              -m "Updated shared .claude/ content (agents, rules, ref, skills, sync)" \
              -m "and distributed config files to repo root." \
              -m "Automated by sync-dotclaude.yml"

            if PUSH_OUTPUT=$(git push origin "$DEFAULT_BRANCH" 2>&1); then
              echo "Successfully synced $REPO_NAME"
              SUCCESS=$((SUCCESS + 1))
              DETAILS="${DETAILS}| ${REPO_NAME} | Updated |\n"
            else
              echo "::warning::Failed to push to $REPO_NAME"
              echo "Push error: $PUSH_OUTPUT"
              FAILED=$((FAILED + 1))
              DETAILS="${DETAILS}| ${REPO_NAME} | Push failed |\n"
            fi

            echo "::endgroup::"
            cd /
            rm -rf "$WORK_DIR"
          done

          echo "## .claude Sync Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Updated | $SUCCESS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Already up to date | $SKIPPED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | $FAILED |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Per-Repo Details" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          printf '%b' "$DETAILS" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED repo(s) failed to sync"
          fi
